markdown: kramdown
kramdown:
  math_engine: katex
SITE_NAME: "AI for Scientific Simulation and Discovery Lab"
# footer和navbar 上用的路径
menuPages:
  - {
      name: "Home",
      url: "/",
      isIndexHeader: false,
      isNavbar: true,
      isFooter: true,
    }
  - {
      name: "Publications",
      url: "/publications",
      isIndexHeader: true,
      isNavbar: true,
      isFooter: true,
    }
  - {
      name: "Talks",
      url: "/talks",
      isIndexHeader: true,
      isNavbar: true,
      isFooter: true,
    }
  - {
      name: "News",
      url: "/news",
      isIndexHeader: true,
      isNavbar: true,
      isFooter: true,
    }
  - {
      name: "People",
      url: "/people",
      isIndexHeader: true,
      isNavbar: true,
      isFooter: true,
    }
  - {
      name: "Opening",
      url: "/opening",
      isIndexHeader: false,
      isNavbar: true,
      isFooter: true,
    }

# footer 上展示的社交媒体
socialLinks:
  - { icon: "fa-github-alt", link: "https://github.com/tailintalent" }
  - { icon: "fa-x-twitter", link: "https://twitter.com/tailin_wu" }

copyright: "Tailin Wu Lab"

plugins:
  - jekyll-polyglot

languages: ["en", "zh"]
default_lang: "en"
exclude_from_localization: ["assets/css", "assets/fonts", "assets/js"]
parallel_localization: true
#网站域名，每次发布到不同的网站前，需要先确认一下
website: "http://10.1.10.115"
